<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSEF GLOBAL SECURITY</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #log { position: fixed; bottom: 10px; width: 100%; background: rgba(0, 255, 0, 0.1); font-size: 0.8rem; padding: 5px; color: #fff; }
        input { padding: 12px; border: 1px solid #0f0; background: #000; color: #0f0; text-align: center; border-radius: 5px; margin-top: 10px; }
        .btn { background: #0f0; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 5px; }
        .radar { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; border: 2px solid #0f0; border-radius: 50%; animation: pulse 2s infinite; }
        .radar::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 2px; background: #0f0; animation: rotate 3s linear infinite; transform-origin: left; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- شاشة القفل -->
    <div id="lockScreen">
        <h2 style="color: #0f0;">[ نظام تشفير يوسف برو ]</h2>
        <input type="password" id="pass" placeholder="كلمة السر...">
        <button class="btn" onclick="checkPass()">دخول آمن</button>
    </div>

    <canvas id="matrix"></canvas>
    <div class="radar"></div>

    <div style="margin-top: 100px;">
        <h1 style= "text-shadow: 0 0 20px #0f0; font-size: 2.5rem;">YOUSEF GLOBAL SECURITY</h1>
        <img src="Youssef.jpg" style="width: 130px; height: 130px; border-radius: 50%; border: 3px solid #0f0; box-shadow: 0 0 20px #0f0; margin-bottom: 20px;">
        
        
        <div id="clock" style="font-size: 1.5rem; color: #fff;">00:00:00</div>
        <p>[ النظام: نشط ومحمي ]</p>
    </div>

    <div id="log">>>> جاري تهيئة بروتوكولات الحماية...</div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('lockScreen').style.display = 'none';
                startLogs();
            } else {
                alert("تم رصد محاولة دخول غير مصرح بها! تم تسجيل عنوان IP الخاص بك.");
            }
        }

        const messages = [
            "جاري فحص الثغرات العالمية...",
            "تم صد هجوم من سيرفر مجهول...",
            "تشفير البيانات بمفتاح 256-bit...",
            "تحليل حركة المرور المشبوهة...",
            "تنبيه: محاولة اختراق تم إحباطها بنجاح!"
        ];
        function startLogs() {
            setInterval(() => {
                document.getElementById('log').innerText = ">>> " + messages[Math.floor(Math.random() * messages.length)];
            }, 3000);
        }

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; drops.forEach((y,i)=>{
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i]=0; drops[i]++;
            });
        }
        setInterval(draw, 33);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>

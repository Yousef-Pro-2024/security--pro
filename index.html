<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; margin: 0; overflow-x: hidden; }
        .container { padding: 20px; border: 1px solid #0f0; margin: 20px; border-radius: 10px; background: rgba(0,255,0,0.05); box-shadow: 0 0 15px #0f0; }
        input { padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 5px; margin: 10px; }
        .btn { background: #0f0; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #map-box { width: 100%; height: 200px; border: 1px solid #0f0; margin-top: 20px; filter: invert(1) hue-rotate(90deg) brightness(0.8); border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2 style="text-shadow: 0 0 10px #0f0;">[ نظام يوسف الأمني ]</h2>
        <input type="password" id="pass" placeholder="أدخل شفرة الدخول...">
        <button class="btn" onclick="playBeep(); checkPass()">دخول آمن</button>
    </div>

    <div class="container">
        <img src="Dg.jpg" style="width: 130px; height: 130px; border-radius: 50%; border: 3px solid #0f0; box-shadow: 0 0 15px #0f0; margin-bottom: 10px;">
        <h1 style="text-shadow: 0 0 10px #0f0;">YOUSEF PRO SECURITY</h1>
        <div id="map-box">
            <<iframe src="https://google.com" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                
        </div>
    </div>

    <script>
        function playBeep() {
            const audio = new Audio(const audio = new Audio('https://soundjay.com');
            
            audio.play().catch(e => console.log("الصوت يحتاج تفاعل"));
        }
        function checkPass() {
            if(document.getElementById('pass').value === "1234") {
                document.getElementById('lockScreen').style.display = 'none';
            } else {
                alert("محاولة اختراق فاشلة!");
            }
        }
    </script>
</body>
</html>

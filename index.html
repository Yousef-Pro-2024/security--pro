<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; margin: 0; transition: background 0.3s; }
        .container { padding: 20px; border: 1px solid #0f0; margin: 20px; border-radius: 10px; box-shadow: 0 0 15px #0f0; background: rgba(0,0,0,0.8); }
        input { padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 5px; margin: 10px; width: 80%; }
        .btn { background: #0f0; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .shake { animation: shake 0.5s; background: #500 !important; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body id="mainBody">

    <!-- شاشة الحماية -->
    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2 id="lockTitle">[ نظام يوسف الأمني ]</h2>
        <input type="password" id="pass" placeholder="أدخل شفرة الدخول...">
        <button class="btn" onclick="checkPass()">دخول آمن</button>
    </div>

    <div class="container">
        <!-- تأكد من وجود ملف الصورة Dg.jpg في حسابك -->
        <img src="Dg.jpg" style="width: 120px; height: 120px; border-radius: 50%; border: 2px solid #0f0; margin-bottom: 15px;">
        <h1 style="text-shadow: 0 0 10px #0f0;">YOUSEF PRO SECURITY</h1>
        
        <!-- الخريطة الخضراء المصححة -->
        <iframe src="https://google.com" width="100%" height="250" style="border:1px solid #0f0; filter: invert(1) hue-rotate(90deg); border-radius: 8px; margin-top: 10px;"></iframe>
        
        <p style="margin-top: 20px;">>>> جاري مراقبة الاتصالات المشفرة...</p>
    </div>

    <script>
        function checkPass() {
            const passInput = document.getElementById('pass');
            const lockScreen = document.getElementById('lockScreen');
            
            if(passInput.value === "1234") {
                // صوت النجاح
                new Audio('https://soundjay.com').play();
                lockScreen.style.display = 'none';
            } else {
                // تأثير الاهتزاز والوميض الأحمر
                lockScreen.classList.add('shake');
                new Audio('https://soundjay.com').play();
                setTimeout(() => { lockScreen.classList.remove('shake'); }, 500);
            }
        }
    </script>
</body>
</html>
